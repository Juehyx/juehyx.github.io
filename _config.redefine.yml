# Redefine theme configuration
# Docs: https://redefine-docs.ohevan.com/

info:
  title: Juehyx
  subtitle: Notes
  author: Juehyx
  url: https://juehyx.github.io

defaults:
  favicon: /images/avatar.svg
  logo:
  avatar: /images/avatar.svg

global:
  fonts:
    chinese:
      enable: true
      family: Noto Serif SC
      url: https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&display=swap
    english:
      enable: true
      family: JetBrains Mono
      url: https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap
  content_max_width: 1000px
  sidebar_width: 260px
  hover:
    shadow: true
    scale: false
  scroll_progress:
    bar: true
    percentage: true
  website_counter:
    enable: false
  single_page: true
  preloader:
    enable: false
  open_graph:
    enable: true
    image: /images/banner.svg
    description: Juehyx 的个人博客，记录 Pwn、二进制安全、CTF 和工程学习笔记。

colors:
  primary: '#2563eb'
  secondary: '#14b8a6'
  default_mode: light

navbar:
  auto_hide: false
  color:
    left: '#2563eb'
    right: '#14b8a6'
    transparency: 35
  width:
    home: 1200px
    pages: 1000px
  links:
    首页:
      path: /
      icon: fa-regular fa-house
    归档:
      path: /archives/
      icon: fa-regular fa-archive
    分类:
      path: /categories/
      icon: fa-regular fa-folder
    标签:
      path: /tags/
      icon: fa-regular fa-tags
    友链:
      path: /links/
      icon: fa-regular fa-link
    关于:
      path: /about/
      icon: fa-regular fa-user
    GitHub:
      path: https://github.com/Juehyx
      icon: fa-brands fa-github
  search:
    enable: true
    preload: true

home_banner:
  enable: true
  style: fixed
  title: Juehyx
  subtitle:
    text:
      - Pwn
      - Binary Security
      - CTF Notes
      - Linux Internals
    hitokoto:
      enable: false
  image:
    light: /images/banner.svg
    dark: /images/banner.svg
  text_color:
    light: '#ffffff'
    dark: '#e5e7eb'
  text_style:
    title_size: 2.8rem
    subtitle_size: 1.5rem
    line_height: 1.2
  custom_font:
    enable: false
  social_links:
    enable: true
    style: default
    links:
      github: https://github.com/Juehyx

home:
  sidebar:
    enable: true
    position: left
    first_item: menu
    announcement: 欢迎来到 Juehyx 的安全学习笔记。
    show_on_mobile: true
    links:
      Archives:
        path: /archives/
        icon: fa-regular fa-archive
      Tags:
        path: /tags/
        icon: fa-regular fa-tags
      About:
        path: /about/
        icon: fa-regular fa-user
  article_date_format: auto
  excerpt_length: 200
  categories:
    enable: true
    limit: 3
  tags:
    enable: true
    limit: 3

articles:
  style:
    font_size: 16px
    line_height: 1.9
    image_border_radius: 8px
    image_alignment: center
    image_caption: false
    link_icon: true
    delete_mask: false
    title_alignment: left
  word_count:
    enable: true
    count: true
    min2read: true
  reading_time:
    enable: true
  copyright:
    enable: true
    default: cc_by_nc_sa
  toc:
    enable: true
    max_depth: 3
    number: true
    expand: true
    init_open: true
  code_block:
    copy: true
    style: mac
    highlight_theme:
      light: github
      dark: vs2015
  lazyload: true
  pangu_js: false

footer:
  runtime: true
  icon: ''
  start: 2026/06/01 00:00:00
  statistics: true
  customize:
  icp:
    enable: false

comment:
  enable: false

plugins:
  feed:
    enable: false
  aplayer:
    enable: false
  mermaid:
    enable: false

page_templates:
  friends_column: 2
  tags_style: blur

cdn:
  enable: false

developer:
  enable: false
